<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcane Swarm - 2D Magic Survival</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <h1>Arcane Swarm</h1>

        <div id="hudStats">Seviye 1 • XP 0/8 • Can 100</div>
        <div id="hudSpells">Büyüler: Arcane Bolt</div>
      </div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
